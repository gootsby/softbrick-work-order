<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>작업지시서_소프트브릭</title>
  <style>
    :root {
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: #d2d2d7;
      --soft: #f5f5f7;
      --paper: #fff;
      --accent: #0071e3;
      --accent-soft: #f0f7ff;
      --danger: #ff3b30;
      --danger-soft: #fff1f0;
      --shadow: 0 22px 50px rgba(0, 0, 0, .10);
    }

    * {
      box-sizing: border-box;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    body {
      margin: 0;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      color: var(--ink);
      background: #f5f5f7;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 410px) minmax(900px, 1fr);
      min-height: 100vh;
    }

    .form-panel {
      max-height: 100vh;
      overflow: auto;
      min-width: 0;
      padding: 24px;
      background: rgba(255, 255, 255, .76);
      border-right: 1px solid rgba(0, 0, 0, .08);
      backdrop-filter: blur(20px);
    }

    .form-panel h1 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .form-logo {
      display: block;
      width: 132px;
      height: auto;
      margin: 2px 0 22px;
      object-fit: contain;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 15px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: var(--ink);
      background: #e9e9ed;
    }

    button.primary {
      color: #fff;
      background: var(--accent);
    }

    .section {
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid rgba(0, 0, 0, .08);
      border-radius: 12px;
      background: rgba(255, 255, 255, .88);
      box-shadow: 0 1px 2px rgba(0, 0, 0, .03);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    label {
      display: block;
      min-width: 0;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    input,
    textarea,
    select {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      margin-top: 5px;
      padding: 10px 12px;
      border: 1px solid rgba(0, 0, 0, .12);
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      background: #fbfbfd;
      outline: none;
    }

    input[type="date"] {
      display: block;
      width: 100% !important;
      max-width: 100%;
      min-width: 0 !important;
      inline-size: 100%;
      min-inline-size: 0 !important;
      max-inline-size: 100%;
      -webkit-appearance: none;
      appearance: none;
      text-align: center;
    }

    input[type="date"]::-webkit-date-and-time-value {
      min-width: 0;
      text-align: center;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    .two {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    .manual-input {
      display: none;
    }

    .manual-input.active {
      display: block;
      margin-top: 8px;
    }

    .doc-control {
      display: grid;
      grid-template-columns: 52px minmax(120px, 1fr) 96px;
      gap: 6px;
      margin-top: 5px;
    }

    .doc-prefix {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      border: 1px solid rgba(0, 0, 0, .12);
      border-radius: 8px;
      background: #f5f5f7;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .doc-control select,
    .doc-control input {
      margin-top: 0;
    }

    .qty-control {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      gap: 6px;
      margin-top: 5px;
    }

    .qty-control input {
      margin-top: 0;
      text-align: center;
    }

    .step-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 8px;
      font-size: 20px;
      line-height: 1;
    }

    .preview-wrap {
      padding: 28px;
      overflow: auto;
    }

    .sheet {
      width: 1123px;
      height: 794px;
      margin: 0 auto;
      padding: 38px 42px;
      background: var(--paper);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 88px 76px 44px 1fr 108px;
      gap: 12px;
      border-radius: 12px;
    }

    .sheet-header {
      display: grid;
      grid-template-columns: 1fr 250px;
      gap: 20px;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 18px;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand-logo {
      display: block;
      width: 116px;
      height: auto;
      margin-bottom: 8px;
      object-fit: contain;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .title-row h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1;
    }

    .doc-number {
      font-size: 18px;
      font-weight: 800;
    }

    .date-card {
      display: grid;
      grid-template-columns: 70px 1fr;
      align-self: end;
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 10px;
      overflow: hidden;
      font-size: 15px;
      background: #fff;
    }

    .date-card div {
      min-height: 36px;
      display: flex;
      align-items: center;
      padding: 9px 12px;
    }

    .date-card div:nth-child(1),
    .date-card div:nth-child(2) {
      border-bottom: 1px solid var(--line);
    }

    .date-card div:nth-child(1),
    .date-card div:nth-child(3) {
      border-right: 1px solid var(--line);
    }

    .date-card .label {
      justify-content: center;
      margin-bottom: 0;
      background: var(--soft);
      color: var(--muted);
      font-weight: 700;
    }

    .date-card .due-label,
    .date-card .due-value {
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1.05fr 1.45fr .95fr .85fr;
      gap: 9px;
    }

    .summary-card {
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 10px;
      padding: 9px 11px;
      background: #fff;
      min-width: 0;
    }

    .summary-card.important {
      border-color: rgba(0, 113, 227, .22);
      background: var(--accent-soft);
    }

    .label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .required-label::before {
      content: "* ";
      color: var(--danger);
      font-weight: 900;
    }

    .value {
      min-width: 0;
      font-size: 17px;
      font-weight: 800;
      line-height: 1.2;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .customer-strip {
      display: grid;
      grid-template-columns: 82px 132px 82px 150px 64px 1fr;
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .strip-label,
    .strip-value {
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 6px 10px;
      border-right: 1px solid var(--line);
      font-size: 14px;
      line-height: 1.2;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .strip-label {
      justify-content: center;
      background: var(--soft);
      font-weight: 700;
    }

    .strip-value {
      font-weight: 800;
    }

    .strip-value:last-child {
      border-right: 0;
      font-size: 13px;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 12px;
      min-height: 0;
    }

    .product-panel,
    .side-panel,
    .memo-panel,
    .check-panel {
      border: 1px solid rgba(0, 0, 0, .10);
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .product-panel {
      display: grid;
      grid-template-rows: 38px 1fr;
      min-height: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      padding: 8px 12px;
      background: var(--soft);
      color: var(--ink);
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 800;
    }

    .product-stage {
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #fff, #fbfbfd);
    }

    .product-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      transform: scale(1.02);
    }

    .image-placeholder {
      color: #98a1ad;
      font-size: 22px;
      font-weight: 800;
    }

    img:not([src]),
    img[hidden],
    .image-placeholder[hidden] {
      display: none !important;
    }

    .side-panel {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      min-height: 0;
    }

    .sample {
      display: grid;
      grid-template-columns: 78px 1fr;
      min-height: 0;
      border-bottom: 1px solid var(--line);
    }

    .sample:last-child {
      border-bottom: 0;
    }

    .sample-title {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px;
      background: var(--soft);
      border-right: 1px solid var(--line);
      font-size: 15px;
      font-weight: 800;
      text-align: center;
    }

    .sample-box {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      min-height: 0;
      padding: 0;
      overflow: hidden;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .sample-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 12px;
      min-height: 0;
    }

    .memo-body {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.35;
      text-align: center;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .check-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 70px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 11px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
    }

    .check-item:nth-child(2n) {
      border-right: 0;
    }

    .box {
      width: 15px;
      height: 15px;
      border: 2px solid var(--ink);
      border-radius: 5px;
      flex: 0 0 auto;
    }

    @media (max-width: 1200px) {
      .app {
        grid-template-columns: 1fr;
      }

      .form-panel {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid #d8dee6;
      }

      .section {
        overflow: hidden;
      }
    }

    @media (max-width: 640px) {
      .form-panel {
        padding: 24px 20px;
        overflow-x: hidden;
      }

      .section {
        padding: 16px 14px;
        overflow: hidden;
      }

      .two {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .doc-control {
        grid-template-columns: 52px minmax(0, 1fr) 82px;
      }

      input,
      textarea,
      select {
        font-size: 16px;
      }

      .preview-wrap {
        padding: 18px 12px;
      }
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 0;
      }

      body {
        background: #fff;
      }

      .form-panel {
        display: none;
      }

      .app {
        display: block;
      }

      .preview-wrap {
        padding: 0;
        overflow: visible;
      }

      .sheet {
        width: 297mm;
        height: 210mm;
        margin: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="form-panel">
      <img class="form-logo" src="softbrick-logo-black.png" alt="SOFTBRICK">
      <h1>작업지시서</h1>
      <div class="actions">
        <button class="primary" type="button" id="printBtn">인쇄</button>
        <button type="button" id="saveBtn">저장</button>
        <button type="button" id="loadBtn">불러오기</button>
        <button type="button" id="resetBtn">샘플</button>
      </div>

      <section class="section">
        <h2>기본 정보</h2>
        <label>Google Sheets 연동 URL
          <input data-field="sheetApiUrl" id="sheetApiUrl" placeholder="Apps Script 웹앱 URL">
        </label>
        <div class="two">
          <label>발주일
            <input type="date" data-field="orderDate" value="2026-05-26">
          </label>
          <label>납기일
            <input type="date" data-field="dueDate" value="2026-06-16">
          </label>
        </div>
        <label>문서번호
          <div class="doc-control">
            <span class="doc-prefix">SB</span>
            <select data-field="docQuarter">
              <option value="1">1분기 (1~3월)</option>
              <option value="2">2분기 (4~6월)</option>
              <option value="3">3분기 (7~9월)</option>
              <option value="4">4분기 (10~12월)</option>
            </select>
            <input data-field="docSeq" value="006">
          </div>
        </label>
        <div class="two">
          <label>담당자
            <input data-field="manager" value="정민구">
          </label>
          <label>담당자 연락처
            <input data-field="managerPhone" value="010-4784-9909">
          </label>
        </div>
      </section>

      <section class="section">
        <h2>제품 정보</h2>
        <div class="two">
          <label>브랜드
            <input data-field="brand" value="소프트브릭">
          </label>
          <label>모델
            <select data-field="model">
              <option>폰타 (F1-0001)</option>
              <option>프라토 (P1-0004)</option>
              <option>도브 (D1-0005)</option>
              <option>소마 (S1-0024)</option>
              <option>루나 (V4-0018)</option>
            </select>
          </label>
        </div>
        <label>구성
          <input data-field="config" placeholder="2,100mm 라운지형">
        </label>
        <div class="two">
          <label>팔걸이 위치
            <select data-field="armrest">
              <option>양쪽 팔걸이</option>
              <option>앉았을 때 좌측 팔걸이</option>
              <option>앉았을 때 우측 팔걸이</option>
            </select>
          </label>
          <label>수량
            <div class="qty-control">
              <button class="step-btn" type="button" data-step="-1" aria-label="수량 줄이기">-</button>
              <input type="number" min="1" step="1" data-field="qty" value="1">
              <button class="step-btn" type="button" data-step="1" aria-label="수량 늘리기">+</button>
            </div>
          </label>
        </div>
        <div class="two">
          <label>원단
            <select data-field="fabric" id="fabricSelect"></select>
            <input class="manual-input" data-field="fabricManual" id="fabricManual" placeholder="원단명 직접 입력">
          </label>
          <label>색상
            <select data-field="color" id="colorSelect"></select>
            <input class="manual-input" data-field="colorManual" id="colorManual" placeholder="색상명 직접 입력">
          </label>
        </div>
      </section>

      <section class="section">
        <h2>고객 정보</h2>
        <div class="two">
          <label>고객명
            <input data-field="customer" placeholder="홍길동">
          </label>
          <label>연락처
            <input data-field="phone" placeholder="010-0000-0000">
          </label>
        </div>
        <label>주소
          <input data-field="address" placeholder="서울 강남구 언주로86길 11, 601호">
        </label>
      </section>

      <section class="section">
        <h2>메모와 옵션</h2>
        <label>공장 전달 메모
          <textarea data-field="memo" placeholder="원단: 6/1(월) 이후 입고 예정&#10;출고: 6/16(화) 예정"></textarea>
        </label>
        <label>기타
          <textarea data-field="option2Text"></textarea>
        </label>
      </section>

      <section class="section">
        <h2>이미지</h2>
        <label>제품 이미지
          <input type="file" accept="image/*" data-image="productImage">
        </label>
        <label>제품 이미지 링크
          <input type="url" data-field="productImageUrl" placeholder="https://example.com/sofa.jpg">
        </label>
        <label>원단/색상 이미지 직접 업로드
          <input type="file" accept="image/*" data-image="fabricImage">
          <input type="hidden" data-field="fabricImageUrl">
        </label>
        <label>라벨 이미지
          <input type="file" accept="image/*" data-image="option1Image">
          <input type="hidden" data-field="option1ImageUrl">
        </label>
        <label>기타 이미지
          <input type="file" accept="image/*" data-image="option2Image">
          <input type="hidden" data-field="option2ImageUrl">
        </label>
      </section>
    </aside>

    <section class="preview-wrap" aria-label="작업지시서 미리보기">
      <article class="sheet">
        <header class="sheet-header">
          <div class="title-block">
            <img class="brand-logo" src="softbrick-logo-black.png" alt="SOFTBRICK">
            <div class="title-row">
              <h1>소프트브릭 작업지시서</h1>
              <div class="doc-number" data-preview="docNoDisplay">SB-1Q-006</div>
            </div>
          </div>
          <div class="date-card">
            <div class="label">발주일</div>
            <div data-preview="orderDateDisplay">2026. 5. 26</div>
            <div class="label due-label">납기일</div>
            <div class="due-value" data-preview="dueDateDisplay">2026. 6. 16</div>
          </div>
        </header>

        <section class="summary-grid">
          <div class="summary-card important">
            <span class="label required-label">모델</span>
            <div class="value" data-preview="model">폰타 (F1-0001)</div>
          </div>
          <div class="summary-card important">
            <span class="label required-label">구성</span>
            <div class="value" data-preview="configDisplay"></div>
          </div>
          <div class="summary-card">
            <span class="label required-label">원단 / 색상</span>
            <div class="value"><span data-preview="fabric">가브리엘</span> / <span data-preview="color">화이트</span></div>
          </div>
          <div class="summary-card">
            <span class="label required-label">수량</span>
            <div class="value" data-preview="qtyDisplay">1 SET</div>
          </div>
        </section>

        <section class="customer-strip">
          <div class="strip-label">고객명</div>
          <div class="strip-value" data-preview="customer"></div>
          <div class="strip-label">연락처</div>
          <div class="strip-value" data-preview="phone"></div>
          <div class="strip-label">주소</div>
          <div class="strip-value" data-preview="address"></div>
        </section>

        <section class="main-content">
          <div class="product-panel">
            <div class="panel-head">
              <span>제품 이미지</span>
              <span data-preview="managerDisplay">담당자: 정민구(010-4784-9909)</span>
            </div>
            <div class="product-stage">
              <img id="productImagePreview" alt="제품 이미지" hidden>
              <div class="image-placeholder" id="productImagePlaceholder">제품 이미지</div>
            </div>
          </div>

          <aside class="side-panel">
            <div class="sample">
              <div class="sample-title">원단<br>색상</div>
              <div class="sample-box">
                <img id="fabricImagePreview" alt="원단/색상 이미지" hidden>
                <span data-preview="fabricMemo"></span>
              </div>
            </div>
            <div class="sample">
              <div class="sample-title">라벨</div>
              <div class="sample-box">
                <img id="option1ImagePreview" src="assets/label-softbrick.JPEG" alt="라벨 이미지">
                <span data-preview="option1Text"></span>
              </div>
            </div>
            <div class="sample">
              <div class="sample-title">기타</div>
              <div class="sample-box">
                <img id="option2ImagePreview" alt="기타 이미지" hidden>
                <span data-preview="option2Text"></span>
              </div>
            </div>
          </aside>
        </section>

        <footer class="footer-grid">
          <section class="memo-panel">
            <div class="panel-head">공장 전달 메모</div>
            <div class="memo-body" data-preview="memo"></div>
          </section>
          <section class="check-panel">
            <div class="panel-head">제작 체크</div>
            <div class="check-grid">
              <div class="check-item"><span class="box"></span>원단 확인</div>
              <div class="check-item"><span class="box"></span>색상 확인</div>
              <div class="check-item"><span class="box"></span>방향 확인</div>
              <div class="check-item"><span class="box"></span>출고 검수</div>
            </div>
          </section>
        </footer>
      </article>
    </section>
  </main>

  <script>
    const fabricCatalog = {
      "퓨전": {
        colors: {
          "그레이지": "assets/fabrics/fusion-01-greige.jpg",
          "샌드": "assets/fabrics/fusion-02-sand.jpg",
          "아이스": "assets/fabrics/fusion-03-ice.jpg",
          "머스타드": "assets/fabrics/fusion-08-mustard.jpg"
        }
      }
    };

    const sample = {
      orderDate: "",
      dueDate: "",
      docQuarter: "1",
      docSeq: "006",
      manager: "정민구",
      managerPhone: "010-4784-9909",
      brand: "소프트브릭",
      model: "폰타 (F1-0001)",
      config: "",
      armrest: "양쪽 팔걸이",
      fabric: "퓨전",
      fabricManual: "",
      color: "그레이지",
      colorManual: "",
      qty: "1",
      customer: "",
      phone: "",
      address: "",
      memo: "",
      fabricMemo: "",
      option1Text: "",
      option2Text: "",
      productImageUrl: "",
      fabricImageUrl: "",
      option1ImageUrl: "",
      option2ImageUrl: "",
      sheetApiUrl: ""
    };

    const fields = document.querySelectorAll("[data-field]");
    const previews = document.querySelectorAll("[data-preview]");
    const printBtn = document.getElementById("printBtn");
    const saveBtn = document.getElementById("saveBtn");
    const loadBtn = document.getElementById("loadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const storageKey = "sofa-work-order-prototype-v3";
    const fabricSelect = document.getElementById("fabricSelect");
    const colorSelect = document.getElementById("colorSelect");
    const fabricManual = document.getElementById("fabricManual");
    const colorManual = document.getElementById("colorManual");
    const sheetApiUrl = document.getElementById("sheetApiUrl");
    const imageUploads = {};
    const imageUrlFieldByUpload = {
      productImage: "productImageUrl",
      fabricImage: "fabricImageUrl",
      option1Image: "option1ImageUrl",
      option2Image: "option2ImageUrl"
    };

    function dateOffset(days = 0) {
      const date = new Date();
      date.setDate(date.getDate() + days);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function defaultValues() {
      return {
        ...sample,
        orderDate: dateOffset(0),
        dueDate: dateOffset(14)
      };
    }

    function formValues() {
      return Array.from(fields).reduce((values, field) => {
        values[field.dataset.field] = field.value;
        return values;
      }, {});
    }

    function setPreview(name, value) {
      previews.forEach((preview) => {
        if (preview.dataset.preview === name) preview.textContent = value;
      });
    }

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      if (!year || !month || !day) return value;
      return `${Number(year)}. ${Number(month)}. ${Number(day)}`;
    }

    function formatDocSeq(value) {
      const trimmed = String(value || "").trim();
      if (!trimmed) return "";
      return /^\d+$/.test(trimmed) ? trimmed.padStart(3, "0") : trimmed;
    }

    function currentDocNo() {
      const values = formValues();
      return `SB-${values.docQuarter || "1"}Q-${formatDocSeq(values.docSeq)}`;
    }

    function cloudPayload() {
      const payload = {
        ...formValues(),
        docNo: currentDocNo()
      };
      Object.entries(imageUploads).forEach(([name, value]) => {
        if (value) payload[`${name}Data`] = value;
      });
      return payload;
    }

    function scriptGet(url, params) {
      return new Promise((resolve, reject) => {
        const callback = `sheetCallback_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const query = new URLSearchParams({ ...params, callback });
        const script = document.createElement("script");

        window[callback] = (data) => {
          delete window[callback];
          script.remove();
          resolve(data);
        };

        script.onerror = () => {
          delete window[callback];
          script.remove();
          reject(new Error("Google Sheets 응답을 불러오지 못했습니다."));
        };

        script.src = `${url}?${query.toString()}`;
        document.body.appendChild(script);
      });
    }

    function scriptPost(url, params) {
      return new Promise((resolve, reject) => {
        const frameName = `sheetPostFrame_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const postToken = `postToken_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const iframe = document.createElement("iframe");
        const form = document.createElement("form");
        let settled = false;

        const cleanup = () => {
          clearTimeout(timer);
          window.removeEventListener("message", handleMessage);
          form.remove();
          iframe.remove();
        };

        const handleMessage = (event) => {
          const data = event.data;
          if (!data || data.postToken !== postToken || settled) return;

          settled = true;
          cleanup();
          if (data.ok) {
            resolve(data);
          } else {
            reject(new Error(data.error || "Google Sheets 저장에 실패했습니다."));
          }
        };

        const timer = setTimeout(() => {
          if (settled) return;
          settled = true;
          cleanup();
          reject(new Error("Google Sheets 저장 응답 시간이 초과되었습니다. Apps Script에서 authorizeOnce를 한 번 실행해 권한을 승인한 뒤 다시 시도해 주세요."));
        }, 120000);

        iframe.name = frameName;
        iframe.hidden = true;

        form.method = "POST";
        form.action = url;
        form.target = frameName;
        form.style.display = "none";
        form.acceptCharset = "UTF-8";

        params.postToken = postToken;

        Object.entries(params).forEach(([name, value]) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = name;
          input.value = value ?? "";
          form.appendChild(input);
        });

        window.addEventListener("message", handleMessage);
        document.body.append(iframe, form);
        form.submit();
      });
    }

    function resizeImageFile(file, maxSize = 1600, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          const source = reader.result;
          const image = new Image();

          image.onload = () => {
            const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
            if (scale >= 1 && file.size <= 900000) {
              resolve(source);
              return;
            }

            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            const context = canvas.getContext("2d");
            context.drawImage(image, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", quality));
          };

          image.onerror = () => reject(new Error("이미지 파일을 읽지 못했습니다."));
          image.src = source;
        };

        reader.onerror = () => reject(new Error("이미지 파일을 읽지 못했습니다."));
        reader.readAsDataURL(file);
      });
    }

    function hasImageUpload(payload) {
      return Object.keys(payload).some((key) => key.endsWith("Data") && payload[key]);
    }

    function clearImageUploads() {
      Object.keys(imageUploads).forEach((key) => delete imageUploads[key]);
      document.querySelectorAll("[data-image]").forEach((input) => {
        input.value = "";
      });
    }

    async function saveToSheet() {
      const url = sheetApiUrl.value.trim();
      if (!url) return false;

      const payload = { action: "save", ...cloudPayload() };
      if (hasImageUpload(payload)) {
        const data = await scriptPost(url, payload);
        if (!data.ok) throw new Error(data.error || "Google Sheets 저장에 실패했습니다.");
        const saved = await scriptGet(url, { action: "load", docNo: data.docNo || payload.docNo });
        if (!saved.ok || !saved.record) throw new Error("저장 후 시트에서 문서를 확인하지 못했습니다.");
        clearImageUploads();
        writeForm({ ...saved.record, sheetApiUrl: url });
        localStorage.setItem(`${storageKey}:sheetApiUrl`, url);
        return true;
      }

      const data = await scriptGet(url, payload);
      if (!data.ok) throw new Error(data.error || "Google Sheets 저장에 실패했습니다.");
      localStorage.setItem(`${storageKey}:sheetApiUrl`, url);
      return true;
    }

    async function loadFromSheet() {
      const url = sheetApiUrl.value.trim();
      if (!url) return false;

      const data = await scriptGet(url, { action: "load", docNo: currentDocNo() });
      if (!data.ok || !data.record) {
        alert("해당 문서번호의 작업지시서를 찾지 못했습니다.");
        return true;
      }

      writeForm({ ...data.record, sheetApiUrl: url });
      localStorage.setItem(`${storageKey}:sheetApiUrl`, url);
      return true;
    }

    function populateFabricOptions(selectedFabric = defaultValues().fabric, selectedColor = defaultValues().color) {
      fabricSelect.innerHTML = Object.keys(fabricCatalog).map((fabric) => (
        `<option value="${fabric}">${fabric}</option>`
      )).join("") + '<option value="직접입력">직접입력</option>';
      fabricSelect.value = fabricCatalog[selectedFabric] || selectedFabric === "직접입력" ? selectedFabric : Object.keys(fabricCatalog)[0];
      populateColorOptions(selectedColor);
      updateManualInputs();
    }

    function populateColorOptions(selectedColor = defaultValues().color) {
      const colors = Object.keys(fabricCatalog[fabricSelect.value]?.colors || {});
      colorSelect.innerHTML = colors.map((color) => `<option value="${color}">${color}</option>`).join("") + '<option value="직접입력">직접입력</option>';
      colorSelect.value = colors.includes(selectedColor) || selectedColor === "직접입력" ? selectedColor : (colors[0] || "직접입력");
      updateManualInputs();
    }

    function updateManualInputs() {
      fabricManual.classList.toggle("active", fabricSelect.value === "직접입력");
      colorManual.classList.toggle("active", colorSelect.value === "직접입력");
    }

    function displayFabric(values) {
      return values.fabric === "직접입력" ? values.fabricManual : values.fabric;
    }

    function displayColor(values) {
      return values.color === "직접입력" ? values.colorManual : values.color;
    }

    function normalizeImageUrl(src) {
      const value = String(src || "").trim();
      if (!value) return "";

      const fileMatch = value.match(/drive\.google\.com\/file\/d\/([^/]+)/);
      if (fileMatch) return `https://drive.google.com/thumbnail?id=${fileMatch[1]}&sz=w1600`;

      const openMatch = value.match(/drive\.google\.com\/open\?id=([^&]+)/);
      if (openMatch) return `https://drive.google.com/thumbnail?id=${openMatch[1]}&sz=w1600`;

      const ucMatch = value.match(/drive\.google\.com\/uc\?[^#]*[?&]id=([^&]+)/);
      if (ucMatch) return `https://drive.google.com/thumbnail?id=${ucMatch[1]}&sz=w1600`;

      return value;
    }

    function setImageBox(name, src, fallbackSrc = "") {
      const image = document.getElementById(`${name}Preview`);
      const placeholder = document.getElementById(`${name}Placeholder`);
      const text = image?.parentElement.querySelector("span");
      const nextSrc = normalizeImageUrl(src || fallbackSrc);

      if (!image) return;

      image.onerror = null;

      if (!nextSrc) {
        image.removeAttribute("src");
        image.hidden = true;
        if (placeholder) placeholder.hidden = false;
        if (text) text.hidden = false;
        return;
      }

      image.onerror = () => {
        image.onerror = null;
        image.removeAttribute("src");
        image.hidden = true;
        if (placeholder) placeholder.hidden = false;
        if (text) text.hidden = false;
      };
      image.src = nextSrc;
      image.hidden = false;
      if (placeholder) placeholder.hidden = true;
      if (text) text.hidden = true;
    }

    function updateFabricImage() {
      const values = formValues();
      const image = document.getElementById("fabricImagePreview");
      if (image?.dataset.manualUpload === "true") return;
      const imagePath = values.fabricImageUrl || fabricCatalog[values.fabric]?.colors?.[values.color];
      setImageBox("fabricImage", imagePath);
    }

    function updateProductImageFromUrl() {
      const values = formValues();
      const image = document.getElementById("productImagePreview");

      if (!image || image.dataset.manualUpload === "true") return;
      setImageBox("productImage", values.productImageUrl);
    }

    function updateOptionImages() {
      const values = formValues();
      const option1Image = document.getElementById("option1ImagePreview");
      const option2Image = document.getElementById("option2ImagePreview");
      if (option1Image?.dataset.manualUpload !== "true") {
        setImageBox("option1Image", values.option1ImageUrl, "assets/label-softbrick.JPEG");
      }
      if (option2Image?.dataset.manualUpload !== "true") {
        setImageBox("option2Image", values.option2ImageUrl);
      }
    }

    function renderDerived() {
      const values = formValues();
      const config = values.config && values.armrest ? `${values.config}\n(${values.armrest})` : values.config;
      const qtyNumber = Math.max(1, Number.parseInt(values.qty, 10) || 1);
      const manager = values.managerPhone ? `담당자: ${values.manager}(${values.managerPhone})` : `담당자: ${values.manager}`;

      setPreview("orderDateDisplay", formatDate(values.orderDate));
      setPreview("dueDateDisplay", formatDate(values.dueDate));
      setPreview("docNoDisplay", currentDocNo());
      setPreview("configDisplay", config);
      setPreview("qtyDisplay", `${qtyNumber} SET`);
      setPreview("managerDisplay", manager);
      setPreview("fabric", displayFabric(values));
      setPreview("color", displayColor(values));
      updateFabricImage();
      updateProductImageFromUrl();
      updateOptionImages();
    }

    function syncField(name, value) {
      previews.forEach((preview) => {
        if (preview.dataset.preview === name) preview.textContent = value;
      });
      renderDerived();
    }

    function writeForm(values) {
      const defaults = defaultValues();
      populateFabricOptions(values.fabric ?? defaults.fabric, values.color ?? defaults.color);
      document.querySelectorAll("[data-image]").forEach((input) => {
        const target = document.getElementById(`${input.dataset.image}Preview`);
        if (target) target.dataset.manualUpload = "false";
      });
      fields.forEach((field) => {
        field.value = values[field.dataset.field] ?? defaults[field.dataset.field] ?? "";
        syncField(field.dataset.field, field.value);
      });
      renderDerived();
    }

    fields.forEach((field) => {
      field.addEventListener("input", () => {
        if (field.dataset.field === "qty") {
          field.value = Math.max(1, Number.parseInt(field.value, 10) || 1);
        }
        if (field.dataset.field === "productImageUrl") {
          const productImage = document.getElementById("productImagePreview");
          if (productImage) productImage.dataset.manualUpload = "false";
        }
        syncField(field.dataset.field, field.value);
      });
      field.addEventListener("change", () => {
        if (field.dataset.field === "fabric") {
          populateColorOptions();
        }
        updateManualInputs();
        syncField(field.dataset.field, field.value);
      });
    });

    document.querySelectorAll("[data-step]").forEach((button) => {
      button.addEventListener("click", () => {
        const qtyField = document.querySelector('[data-field="qty"]');
        const nextValue = Math.max(1, (Number.parseInt(qtyField.value, 10) || 1) + Number.parseInt(button.dataset.step, 10));
        qtyField.value = String(nextValue);
        syncField("qty", qtyField.value);
      });
    });

    document.querySelectorAll("[data-image]").forEach((input) => {
      input.addEventListener("change", () => {
        const target = document.getElementById(`${input.dataset.image}Preview`);
        const placeholder = document.getElementById(`${input.dataset.image}Placeholder`);
        const siblingText = target?.parentElement.querySelector("span");
        const file = input.files && input.files[0];

        if (!file || !target) {
          delete imageUploads[input.dataset.image];
          if (target) {
            target.removeAttribute("src");
            target.dataset.manualUpload = "false";
            target.hidden = true;
          }
          if (placeholder) placeholder.hidden = false;
          if (siblingText) siblingText.hidden = false;
          return;
        }

        resizeImageFile(file).then((imageData) => {
          target.src = imageData;
          imageUploads[input.dataset.image] = imageData;
          const urlFieldName = imageUrlFieldByUpload[input.dataset.image];
          const urlField = urlFieldName ? document.querySelector(`[data-field="${urlFieldName}"]`) : null;
          if (urlField) {
            urlField.value = "";
          }
          target.dataset.manualUpload = "true";
          target.hidden = false;
          if (placeholder) placeholder.hidden = true;
          if (siblingText) siblingText.hidden = true;
        }).catch((error) => {
          alert(error.message);
        });
      });
    });

    saveBtn.addEventListener("click", async () => {
      try {
        if (await saveToSheet()) {
          saveBtn.textContent = "시트 저장됨";
          setTimeout(() => {
            saveBtn.textContent = "저장";
          }, 1200);
          return;
        }
      } catch (error) {
        alert(`Google Sheets 저장에 실패했습니다.\n${error.message}`);
      }

      localStorage.setItem(storageKey, JSON.stringify(formValues()));
      saveBtn.textContent = "저장됨";
      setTimeout(() => {
        saveBtn.textContent = "저장";
      }, 1200);
    });

    loadBtn.addEventListener("click", async () => {
      try {
        if (await loadFromSheet()) return;
      } catch (error) {
        alert(`Google Sheets 불러오기에 실패했습니다.\n${error.message}`);
      }

      const saved = localStorage.getItem(storageKey);
      if (saved) writeForm(JSON.parse(saved));
    });

    resetBtn.addEventListener("click", () => writeForm(defaultValues()));

    printBtn.addEventListener("click", () => {
      const previousTitle = document.title;
      document.title = `소프트브릭_작업지시서_${currentDocNo()}`;
      window.print();
      setTimeout(() => {
        document.title = previousTitle;
      }, 1000);
    });

    writeForm(defaultValues());
    const savedSheetUrl = localStorage.getItem(`${storageKey}:sheetApiUrl`);
    if (savedSheetUrl) {
      sheetApiUrl.value = savedSheetUrl;
      syncField("sheetApiUrl", savedSheetUrl);
    }
    renderDerived();
  </script>
</body>
</html>
